<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joyeux Anniversaire Papa !</title>
    <link rel="stylesheet" href="style.css">
    <!-- Police Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <!-- Librairie JS pour les confettis -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>
    <div class="main-wrapper">
        <!-- Ballons décoratifs -->
        <div class="balloon b1"></div>
        <div class="balloon b2"></div>
        <div class="balloon b3"></div>
        <div class="balloon b4"></div>

        <div class="container" id="card-container">
            <h1 id="intro-text">J'ai une surprise pour toi...</h1>
            
            <!-- Boîte cadeau animée -->
            <div class="gift-container" id="gift-box">
                <div class="gift">
                    <div class="gift-lid"></div>
                    <div class="gift-box"></div>
                </div>
                <div class="click-instruction">Clique pour ouvrir ! 👇</div>
            </div>

            <!-- Contenu caché -->
            <div id="hidden-message" class="hidden">
                <div class="photo-frame">
                    <!-- Placeholder pour une photo -->
                    <div class="photo-placeholder">👴</div>
                    <!-- <img src="papa.jpg" alt="Papa" class="photo"> -->
                </div>
                <h1 class="main-title">Joyeux Anniversaire Papa ! 🎉</h1>
                <p class="subtitle">Merci d'être un père extraordinaire.<br>Je t'aime fort ! ❤️</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
